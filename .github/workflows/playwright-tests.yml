name: Playwright API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '30 9 * * *'  # Runs daily at 09:30 UTC
  workflow_dispatch:  # Allows manual triggering from GitHub UI

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # Fetches the repository code

      - name: Install Dependencies
        run: npm ci  # Installs project dependencies

      - name: Install Playwright Browsers
        run: npx playwright install chromium  # Installs only Chromium

      - name: Run Playwright Tests
        run: npx playwright test --config=./playwright.config.js --project=chromium

      - name: Upload Playwright Test Report
        if: always()  # Ensures the report is uploaded even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report  # Artifact name
          path: playwright-report/
          retention-days: 7  # Report retention duration
